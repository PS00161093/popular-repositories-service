github:
  token: ${GITHUB_TOKEN}
  base-url: https://api.github.com
  per-page: 100

scoring:
  weights:
    stars: 0.6
    forks: 0.3
    recency: 0.1

spring:
  threads:
    virtual:
      enabled: true
  jackson:
    property-naming-strategy: SNAKE_CASE
  cache:
    type: caffeine
    cache-names: repositories
    caffeine:
      spec: maximumSize=500,expireAfterWrite=12h
  mvc:
    problemdetails:
      enabled: true
  http:
    clients:
      connect-timeout: 5s
      read-timeout: 10s

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

resilience4j:
  retry:
    instances:
      github-search:
        max-attempts: 3
        wait-duration: 500ms
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - com.redcare.github.exception.GitHubApiException
        ignore-exceptions:
          - com.redcare.github.exception.RateLimitExceededException
  circuitbreaker:
    instances:
      github-search:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        record-exceptions:
          - com.redcare.github.exception.GitHubApiException
        ignore-exceptions:
          - com.redcare.github.exception.RateLimitExceededException
